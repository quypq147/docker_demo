name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # Bước 1: Đăng nhập vào Docker Hub
    - name: Đăng nhập vào Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Bước 2: Build code Spring Boot thành Docker image và Push lên Hub
    - name: Build và Push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: quypq147/demo_spring_docker:latest

    # Bước 3: Gọi Webhook để Server tự động kéo image về chạy
    - name: Triển khai lên DevOps Classroom
      run: |
        REPO="quypq147/demo_spring_docker"
        CONTAINER_PORT=80
        
        # LƯU Ý: Đổi slot=1 thành slot=8 ở dòng dưới nếu bạn dùng SLOT 8 nhé!
        RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=4&container_port=$CONTAINER_PORT&strict_container_port=0")
        
        BODY=$(echo "$RESPONSE" | sed "$d")
        CODE=$(echo "$RESPONSE" | tail -n1)
        echo "Webhook HTTP: $CODE"
        if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
          echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
          exit 1
        fi
        echo "Deploy thành công."
        echo "::group::Chi tiết webhook JSON"
        echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
        echo "::endgroup::"
